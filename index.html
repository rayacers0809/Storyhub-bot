<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StoryHUB — 티켓 로그</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #a78bfa;
    --accent2: #f472b6;
    --text: #e2e2f0;
    --muted: #6b6b8a;
    --bot: #1e1e35;
    --user: #18181f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── 배경 그리드 텍스처 ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(167,139,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(167,139,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── 헤더 ── */
  header {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 48px 24px 32px;
    flex-direction: column;
    gap: 8px;
  }
  .logo-word {
    font-family: 'Bodoni Moda', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-sub {
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── 검색/랜딩 섹션 ── */
  .landing {
    position: relative; z-index: 1;
    max-width: 540px;
    margin: 0 auto;
    padding: 0 24px 80px;
    text-align: center;
  }
  .landing h2 {
    font-family: 'Bodoni Moda', serif;
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 12px;
  }
  .landing p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.7;
  }
  .search-box {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px 6px 6px 20px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
  }
  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-box button {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 10px 22px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .search-box button:hover { opacity: 0.85; }

  /* ── 티켓 뷰 ── */
  #ticket-view {
    display: none;
    position: relative; z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }
  .ticket-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 24px;
  }
  .ticket-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(167,139,250,0.12);
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .ticket-title {
    font-family: 'Bodoni Moda', serif;
    font-size: 1.8rem;
    font-weight: 400;
    margin-bottom: 20px;
    line-height: 1.3;
  }
  .ticket-meta {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .meta-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
  }
  .meta-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .meta-value {
    font-size: 0.88rem;
    color: var(--text);
    font-weight: 400;
  }
  .status-open  { color: #4ade80; }
  .status-closed { color: #f87171; }

  /* ── 채팅 로그 ── */
  .chat-log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .chat-log-title {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chat-log-title::before {
    content: '';
    display: block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  .messages {
    padding: 8px 0;
    max-height: 65vh;
    overflow-y: auto;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 14px;
    padding: 10px 24px;
    transition: background 0.15s;
  }
  .msg:hover { background: rgba(255,255,255,0.02); }
  .msg.is-bot { background: rgba(167,139,250,0.03); }

  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    object-fit: cover;
    border: 1px solid var(--border);
  }
  .msg-avatar-placeholder {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    color: #fff;
    font-weight: 500;
  }
  .msg-body { flex: 1; min-width: 0; }
  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 3px;
  }
  .msg-author {
    font-weight: 500;
    font-size: 0.88rem;
    color: var(--accent);
  }
  .msg-author.is-bot { color: var(--accent2); }
  .msg-time {
    font-size: 0.7rem;
    color: var(--muted);
  }
  .msg-content {
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--text);
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg-attachment {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.78rem;
    color: var(--accent);
    text-decoration: none;
  }
  .msg-attachment:hover { border-color: var(--accent); }
  .msg-img { max-width: 300px; border-radius: 8px; margin-top: 8px; }

  /* ── 없음 상태 ── */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 16px; }
  .empty-state h3 {
    font-family: 'Bodoni Moda', serif;
    font-weight: 400;
    font-size: 1.3rem;
    margin-bottom: 8px;
    color: var(--text);
  }

  /* ── 로딩 스피너 ── */
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 에러 ── */
  .error-box {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    color: #f87171;
    font-size: 0.85rem;
    margin: 16px 0;
  }

  /* ── 링크 복사 버튼 ── */
  .copy-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 페이드인 ── */
  .fade-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<header>
  <div class="logo-word">StoryHUB</div>
  <div class="logo-sub">Ticket Archive System</div>
</header>

<!-- 랜딩: 티켓 ID 검색 -->
<div class="landing" id="landing-section">
  <h2>티켓 로그 조회</h2>
  <p>티켓 종료 시 발급된 고유 ID를 입력하면<br />문의 내용 전체를 확인할 수 있습니다.</p>
  <div class="search-box">
    <input type="text" id="ticket-id-input" placeholder="Ticket ID를 입력하세요 (예: uuid-...)" />
    <button onclick="loadTicket()">조회하기</button>
  </div>
  <div id="search-error"></div>
</div>

<!-- 티켓 뷰 -->
<div id="ticket-view">
  <div id="ticket-content"></div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  // ★ 여기에 Firebase 웹 앱 설정 입력
  const firebaseConfig = {
    apiKey:            'AIzaSyCFlnkrJYJe_0iiL3B0Y1QmgbdIzLmBx-s',
    authDomain:        'storyhub-c8cdb.firebaseapp.com',
    projectId:         'storyhub-c8cdb',
    storageBucket:     'storyhub-c8cdb.firebasestorage.app',
    messagingSenderId: '17886216388',
    appId:             '1:17886216388:web:352f5614f9a1729e514991',
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // URL 파라미터로 자동 로드 (/ticket/UUID)
  const path = location.pathname;
  const match = path.match(/\/ticket\/([a-f0-9-]{36})/i);
  if (match) {
    document.getElementById('ticket-id-input').value = match[1];
    fetchTicket(match[1]);
  }

  window.loadTicket = () => {
    const id = document.getElementById('ticket-id-input').value.trim();
    if (!id) return;
    // URL 변경
    history.pushState({}, '', `/ticket/${id}`);
    fetchTicket(id);
  };

  // Enter 키 지원
  document.getElementById('ticket-id-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') window.loadTicket();
  });

  async function fetchTicket(ticketId) {
    const errEl  = document.getElementById('search-error');
    const view   = document.getElementById('ticket-view');
    const content = document.getElementById('ticket-content');

    errEl.innerHTML = '';
    content.innerHTML = `<div style="text-align:center;padding:60px"><div class="spinner"></div></div>`;
    view.style.display = 'block';
    document.getElementById('landing-section').style.paddingBottom = '24px';

    try {
      const snap = await getDoc(doc(db, 'tickets', ticketId));
      if (!snap.exists()) {
        content.innerHTML = `
          <div class="empty-state fade-in">
            <div class="icon">🔍</div>
            <h3>티켓을 찾을 수 없습니다</h3>
            <p>ID를 다시 확인해주세요.</p>
          </div>`;
        return;
      }

      const t = snap.data();
      content.innerHTML = renderTicket(t);
    } catch (e) {
      content.innerHTML = `<div class="error-box fade-in">⚠️ 로드 실패: ${e.message}</div>`;
    }
  }

  function renderTicket(t) {
    const typeEmoji = { DRM: '🔒', OPEN: '📂', ETC: '💳', PATCH: '🔧' }[t.type] || '🎫';
    const statusClass = t.status === 'closed' ? 'status-closed' : 'status-open';
    const statusText  = t.status === 'closed' ? '종료됨' : '진행중';
    const createdAt   = new Date(t.createdAt).toLocaleString('ko-KR');
    const closedAt    = t.closedAt ? new Date(t.closedAt).toLocaleString('ko-KR') : '—';
    const num = String(t.ticketNumber).padStart(4, '0');

    const messagesHtml = (t.messages || []).map(renderMessage).join('');
    const msgCount = (t.messages || []).filter(m => !m.isBot).length;

    return `
    <div class="fade-in">
      <div class="ticket-header">
        <div class="ticket-badge">${typeEmoji} ${t.typeLabel || t.type}</div>
        <div class="ticket-title">티켓 #${num}</div>
        <div class="ticket-meta">
          <div class="meta-item">
            <div class="meta-label">상태</div>
            <div class="meta-value ${statusClass}">${statusText}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">생성자</div>
            <div class="meta-value">${esc(t.userDisplayName)} <span style="color:var(--muted);font-size:0.75rem">${esc(t.userTag)}</span></div>
          </div>
          <div class="meta-item">
            <div class="meta-label">생성일</div>
            <div class="meta-value">${createdAt}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">종료일</div>
            <div class="meta-value">${closedAt}</div>
          </div>
          ${t.closedBy ? `
          <div class="meta-item">
            <div class="meta-label">닫은 사람</div>
            <div class="meta-value">${esc(t.closedBy)}</div>
          </div>` : ''}
          ${t.claimedBy ? `
          <div class="meta-item">
            <div class="meta-label">담당 스탭</div>
            <div class="meta-value">${esc(t.claimedBy)}</div>
          </div>` : ''}
          <div class="meta-item">
            <div class="meta-label">메시지 수</div>
            <div class="meta-value">${msgCount}개</div>
          </div>
        </div>
        <div style="margin-top:16px">
          <button class="copy-btn" onclick="copyLink()">🔗 링크 복사</button>
        </div>
      </div>

      <div class="chat-log">
        <div class="chat-log-title">채팅 로그</div>
        <div class="messages">
          ${messagesHtml || '<div class="empty-state" style="padding:40px"><p>메시지가 없습니다.</p></div>'}
        </div>
      </div>
    </div>`;
  }

  function renderMessage(msg) {
    const time = new Date(msg.timestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    const initial = (msg.authorTag || '?')[0].toUpperCase();
    const botClass = msg.isBot ? 'is-bot' : '';

    const avatar = msg.authorAvatar
      ? `<img class="msg-avatar" src="${esc(msg.authorAvatar)}" alt="" onerror="this.style.display='none'" />`
      : `<div class="msg-avatar-placeholder">${esc(initial)}</div>`;

    const attachmentsHtml = (msg.attachments || []).map(a => {
      if (a.contentType && a.contentType.startsWith('image/')) {
        return `<a href="${esc(a.url)}" target="_blank"><img class="msg-img" src="${esc(a.url)}" alt="${esc(a.name)}" loading="lazy" /></a>`;
      }
      return `<a class="msg-attachment" href="${esc(a.url)}" target="_blank">📎 ${esc(a.name)}</a>`;
    }).join('');

    // 봇 임베드는 스킵 (시스템 메시지 제외 목적)
    if (msg.isBot && !msg.content && !attachmentsHtml) return '';

    return `
    <div class="msg ${botClass}">
      ${avatar}
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-author ${botClass}">${esc(msg.authorTag)}</span>
          ${msg.isBot ? '<span style="background:rgba(244,114,182,0.15);color:var(--accent2);font-size:0.6rem;padding:1px 6px;border-radius:4px;letter-spacing:0.08em">BOT</span>' : ''}
          <span class="msg-time">${time}</span>
        </div>
        ${msg.content ? `<div class="msg-content">${esc(msg.content)}</div>` : ''}
        ${attachmentsHtml}
      </div>
    </div>`;
  }

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  window.copyLink = () => {
    navigator.clipboard.writeText(location.href).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✅ 복사됨';
      setTimeout(() => { btn.textContent = '🔗 링크 복사'; }, 1500);
    });
  };
</script>
</body>
</html>
